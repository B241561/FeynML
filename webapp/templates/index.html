{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 animate-premium">
            <div class="text-center mb-5">
                <h1 class="display-5 fw-bold mb-3">Start New Investigation</h1>
                <p class="lead text-muted">Upload your dataset to begin the diagnostic audit.</p>
            </div>
            
            <div class="card p-5 shadow border-0 rounded-4">
                <form action="{{ url_for('upload_file') }}" method="post" enctype="multipart/form-data">
                    <div class="mb-5 text-center p-5 border-2 border-dashed rounded-4 bg-main border-color" id="drop-area">
                        <i class="bi bi-cloud-arrow-up display-3 text-indigo-600 mb-3"></i>
                        <h4 class="fw-bold">Drag & Drop Dataset</h4>
                        <p class="text-muted small">Supports CSV and JSON formats</p>
                        <input type="file" name="dataset" class="form-control mt-4 d-none" id="fileInput" accept=".csv,.json" required>
                        <button type="button" class="btn btn-outline-indigo px-4" onclick="document.getElementById('fileInput').click()">
                            Browse Files
                        </button>
                        <div id="file-name" class="mt-3 small fw-bold text-indigo-600"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-indigo w-100 p-3 rounded-3 fw-bold fs-5 shadow-sm">
                        Continue to Configuration
                    </button>
                </form>
            </div>
            
            <div class="mt-5 row g-4">
                <div class="col-md-4 text-center">
                    <div class="h3 fw-bold text-indigo-600 mb-1">100%</div>
                    <div class="small text-muted text-uppercase fw-bold">Secure</div>
                </div>
                <div class="col-md-4 text-center border-start border-end">
                    <div class="h3 fw-bold text-indigo-600 mb-1">Local</div>
                    <div class="small text-muted text-uppercase fw-bold">Processing</div>
                </div>
                <div class="col-md-4 text-center">
                    <div class="h3 fw-bold text-indigo-600 mb-1">4 Phase</div>
                    <div class="small text-muted text-uppercase fw-bold">Audit</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('file-name');
    const dropArea = document.getElementById('drop-area');

    fileInput.addEventListener('change', function(e) {
        if (this.files && this.files.length > 0) {
            fileNameDisplay.textContent = `Selected: ${this.files[0].name}`;
        }
    });

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.add('border-indigo-600'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.remove('border-indigo-600'), false);
    });

    dropArea.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        fileInput.files = files;
        fileNameDisplay.textContent = `Selected: ${files[0].name}`;
    }
</script>
{% endblock %}
