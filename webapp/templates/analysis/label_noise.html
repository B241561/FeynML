{% extends "base.html" %}
{% block title %}Label Noise Analysis{% endblock %}
{% block content %}
<div class="container py-4">
  <h2>Label Noise Analysis</h2>
  <form method="post" action="{{ url_for('phase4.label_noise_run') }}">
    <div class="mb-3">
      <label class="form-label">Dataset</label>
      <select name="dataset_id" class="form-select">
        {% for d in datasets %}
        <option value="{{ d.id }}">{{ d.original_name }} ({{ d.uploaded_at.strftime('%Y-%m-%d') }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Target column</label>
      <input name="target_col" class="form-control" required />
    </div>
    <button class="btn btn-indigo" type="submit">Run Label Noise Analysis</button>
  </form>
  <hr/>
  <div id="results"></div>
</div>
{% endblock %}
