{% extends "base.html" %}
{% block title %}Leakage Detection{% endblock %}
{% block content %}
<div class="container py-4">
  <h2>Leakage Detection</h2>
  <form method="post" action="{{ url_for('phase4.leakage_run') }}">
    <div class="mb-3">
      <label class="form-label">Dataset</label>
      <select name="dataset_id" class="form-select">
        {% for d in datasets %}
        <option value="{{ d.id }}">{{ d.original_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Target column</label>
      <input name="target_col" class="form-control" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Optional date column (for temporal leakage)</label>
      <input name="date_col" class="form-control" />
    </div>
    <button class="btn btn-indigo" type="submit">Run Leakage Detection</button>
  </form>
</div>
{% endblock %}
