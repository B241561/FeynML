{% extends 'base.html' %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card p-4" style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius);">
        <h4 class="mb-3">Application Settings</h4>
        <form method="post" action="{{ url_for('admin_settings') }}">
          <div class="mb-3">
            <label class="form-label">Site Name</label>
            <input name="site_name" class="form-control" value="{{ settings.get('site_name','FeynML') }}">
          </div>

          <div class="mb-3">
            <label class="form-label">Theme</label>
            <select name="theme" class="form-select">
              <option value="dark" {% if settings.get('theme')=='dark' %}selected{% endif %}>Dark</option>
              <option value="light" {% if settings.get('theme')=='light' %}selected{% endif %}>Light</option>
              <option value="auto" {% if settings.get('theme')=='auto' %}selected{% endif %}>Auto</option>
            </select>
          </div>

          <div class="mb-3 form-check form-switch">
            <input class="form-check-input" type="checkbox" id="maintenance_mode" name="maintenance_mode" value="1" {% if settings.get('maintenance_mode')=='true' %}checked{% endif %}>
            <label class="form-check-label" for="maintenance_mode">Maintenance Mode</label>
          </div>

          <div class="mb-3">
            <label class="form-label">Default Upload Limit (MB)</label>
            <input type="number" name="upload_limit_mb" class="form-control" value="{{ settings.get('upload_limit_mb', 50) }}">
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-indigo" type="submit">Save Settings</button>
            <a href="{{ url_for('admin') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
