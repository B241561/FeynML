{% extends "base.html" %}

{% block title %}Login | FeynML{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card p-5 shadow-lg border-0">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Welcome back</h2>
                    <p class="text-muted">Sign in to access your FeynML workspace, saved reports, and dataset library.</p>
                </div>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase">Email</label>
                        <input type="email" name="email" class="form-control bg-main border-color" placeholder="you@company.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase">Password</label>
                        <input type="password" name="password" class="form-control bg-main border-color" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-indigo w-100 py-3 fw-bold">Sign In</button>
                </form>
                <div class="text-center mt-4 small text-muted">
                    New to FeynML? <a href="{{ url_for('signup') }}" class="text-indigo-200">Create an account</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
